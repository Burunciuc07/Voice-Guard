<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceGuard - AI Audio Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
            --primary: #8b5cf6;
            --primary-hover: #a78bfa;
            --real: #10b981;
            --fake: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #6d28d9; }
        .blob-2 { bottom: -20%; right: -10%; width: 600px; height: 600px; background: #be123c; animation-delay: -5s; }
        .blob-3 { top: 40%; left: 60%; width: 300px; height: 300px; background: #0369a1; animation-duration: 15s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -50px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transform: translateY(20px);
            opacity: 0;
            animation: fade-up 0.8s ease forwards;
        }

        @keyframes fade-up {
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #c4b5fd, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .upload-area {
            border: 2px dashed rgba(139, 92, 246, 0.4);
            border-radius: 16px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(139, 92, 246, 0.02);
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.08);
            transform: scale(1.02);
        }

        .upload-area svg {
            width: 48px;
            height: 48px;
            fill: var(--primary);
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        .upload-area:hover svg {
            transform: translateY(-5px);
        }

        .upload-area input {
            display: none;
        }

        .btn {
            margin-top: 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }
        
        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-container {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }
        
        .result-container.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .result-label {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .label-real { color: var(--real); }
        .label-fake { color: var(--fake); }

        .confidence-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .confidence-bar {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .selected-file {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--primary-hover);
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <h1>VoiceGuard</h1>
        <p class="subtitle">Upload an audio recording to detect AI voice cloning</p>

        <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <svg viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
            </svg>
            <p>Click to browse or drag & drop</p>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem">Only .wav files are supported</p>
            <input type="file" id="file-input" accept=".wav">
        </div>
        
        <div class="selected-file" id="file-name"></div>

        <button class="btn" id="analyze-btn" disabled>
            <span id="btn-text">Analyze Audio</span>
            <div class="loader" id="btn-loader"></div>
        </button>

        <div class="result-container" id="result-box">
            <div class="result-label" id="result-label">FAKE</div>
            <p id="result-confidence">Confidence: 98.5%</p>
            <div class="confidence-bar-bg">
                <div class="confidence-bar" id="confidence-bar"></div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileNameDisp = document.getElementById('file-name');
        const analyzeBtn = document.getElementById('analyze-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const resultBox = document.getElementById('result-box');
        const resultLabel = document.getElementById('result-label');
        const resultConfidence = document.getElementById('result-confidence');
        const confidenceBar = document.getElementById('confidence-bar');
        
        let selectedFile = null;

        // Drag and drop handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFileSelect, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFileSelect(e) {
            const files = e.target.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            if (files.length > 0) {
                const file = files[0];
                if (file.name.toLowerCase().endsWith('.wav')) {
                    selectedFile = file;
                    fileNameDisp.textContent = file.name;
                    analyzeBtn.disabled = false;
                    resultBox.classList.remove('show'); // Hide previous result
                } else {
                    alert("Please select a valid .wav file.");
                    selectedFile = null;
                    fileNameDisp.textContent = "";
                    analyzeBtn.disabled = true;
                }
            }
        }

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // UI Loading state
            analyzeBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            resultBox.classList.remove('show');
            confidenceBar.style.width = '0%';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || "Server Error");
                }
                
                const data = await response.json();
                
                // Process result
                const isFake = data.label === 'FAKE';
                const confPercent = (data.confidence * 100).toFixed(1);
                
                resultLabel.textContent = data.label;
                resultLabel.className = 'result-label ' + (isFake ? 'label-fake' : 'label-real');
                resultConfidence.textContent = `Confidence: ${confPercent}%`;
                
                resultBox.classList.add('show');
                
                setTimeout(() => {
                    confidenceBar.style.width = `${confPercent}%`;
                    confidenceBar.style.background = isFake ? 'var(--fake)' : 'var(--real)';
                }, 100);

            } catch (error) {
                alert(`Error analyzing audio: ${error.message}`);
            } finally {
                // Reset UI
                analyzeBtn.disabled = false;
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
